<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biomas em Guerra: A Grande Expansão</title>
    <style>
        :root {
            --bg: #0b0e14;
            --card: rgba(22, 27, 34, 0.95);
            --border: #30363d;
            --text: #e6edf3;
            --forest: #2ecc71;
            --invader: #e74c3c;
            --bridge: #f39c12;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { height: 80px; display: flex; justify-content: space-between; align-items: center; padding: 0 40px; background: var(--card); border-bottom: 2px solid var(--border); }
        .stats { display: flex; gap: 20px; align-items: center; }
        .faction-badge { padding: 10px 20px; border-radius: 12px; border: 1px solid var(--border); font-weight: 900; }
        .faction-badge.forest { color: var(--forest); border-color: var(--forest); }
        .faction-badge.invader { color: var(--invader); border-color: var(--invader); }
        .faction-badge.active { background: rgba(255,255,255,0.1); box-shadow: 0 0 20px rgba(255,255,255,0.05); }

        main { flex: 1; display: flex; padding: 20px; gap: 20px; position: relative; }
        #map-container { flex: 3; background: #000; border-radius: 20px; border: 1px solid var(--border); box-shadow: inset 0 0 50px rgba(0,0,0,1); }
        #svg-map { width: 100%; height: 100%; }

        #log-area { flex: 1; background: var(--card); border-radius: 15px; border: 1px solid var(--border); display: flex; flex-direction: column; padding: 15px; }
        #log-entries { flex: 1; overflow-y: auto; font-size: 0.85rem; padding-right: 10px; }
        .log-entry { margin-bottom: 8px; border-left: 3px solid #444; padding-left: 10px; }
        .log-entry.forest { border-color: var(--forest); }
        .log-entry.invader { border-color: var(--invader); }

        .controls { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; }
        .btn { padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; font-size: 0.9rem; }
        .btn-main { background: #58a6ff; color: #fff; box-shadow: 0 4px 0 #2188ff; }
        .btn-main:active { transform: translateY(4px); box-shadow: none; }
        .btn-special { background: #21262d; color: var(--text); border: 1px solid var(--border); }

        .territory { cursor: pointer; transition: 0.2s; }
        .territory:hover .node-circle { filter: brightness(1.3); r: 28; }
        .territory.selected .node-circle { stroke: #fff; stroke-width: 3px; r: 30; }
        
        .bridge-line { stroke: var(--bridge); stroke-width: 4; stroke-dasharray: 8 4; opacity: 0.6; }
        .biome-line { stroke: #555; stroke-width: 1.5; opacity: 0.3; }

        #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        #modal-content { background: #1c2128; padding: 40px; border-radius: 20px; border: 1px solid var(--border); max-width: 600px; width: 90%; text-align: center; }
        #modal-content img { max-width: 100%; border-radius: 10px; margin: 20px 0; border: 1px solid var(--border); }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <header>
        <div class="stats">
            <div class="faction-badge forest" id="f-stats">FLORESTA: <span id="f-count">10</span></div>
        </div>
        <div style="text-align: center;">
            <h2 id="turn-name" style="letter-spacing: 2px;">VEZ DA FLORESTA</h2>
            <p id="phase-name" style="font-size: 0.8rem; color: #888; text-transform: uppercase;">Recrutamento</p>
        </div>
        <div class="stats">
            <div class="faction-badge invader" id="i-stats">INVASORES: <span id="i-count">10</span></div>
        </div>
    </header>

    <main>
        <div id="map-container">
            <svg id="svg-map" viewBox="0 0 1000 800">
                <g id="links-layer"></g>
                <g id="terrs-layer"></g>
            </svg>
        </div>
        <div id="log-area">
            <h3 style="margin-bottom: 10px; font-size: 0.9rem; color: #888;">DIÁRIO DE GUERRA</h3>
            <div id="log-entries"></div>
            <div class="controls">
                <button class="btn btn-main" id="next-btn">Próxima Fase</button>
                <div id="dice-pouch" class="hidden" style="text-align: center; font-weight: bold; padding: 5px;">
                    Dado: <span id="dice-val" style="color: #ffca28; font-size: 1.5rem;">6</span>
                </div>
            </div>
        </div>
    </main>

    <div id="modal-overlay" class="hidden">
        <div id="modal-content">
            <h2 id="m-title">Alerta Biológico!</h2>
            <div id="m-body"></div>
            <div id="m-quiz" class="hidden" style="margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
            <button class="btn btn-main" style="width: 100%; margin-top: 30px;" id="m-close">Entendido</button>
        </div>
    </div>

    <script>
        const GAME_DATA = {
            BIOMES: {
                AMAZONIA: { x: 500, y: 150, color: '#2ecc71', name: 'Amazônia' },
                CAATINGA: { x: 800, y: 350, color: '#f1c40f', name: 'Caatinga' },
                CERRADO: { x: 200, y: 350, color: '#e67e22', name: 'Cerrado' },
                ATLANTICA: { x: 800, y: 600, color: '#1e8449', name: 'Mata Atlântica' },
                PANTANAL: { x: 200, y: 600, color: '#3498db', name: 'Pantanal' },
                COSTAO: { x: 500, y: 700, color: '#95a5a6', name: 'Costão Rochoso' }
            },
            NODES: {
                'BASE': { n: 'BASE INVASORA', b: 'CENTER', x: 500, y: 400, startOwner: 'INVADER' },
                // Amazônia (Norte)
                'A1': { n: 'Ponte Amazônia', b: 'AMAZONIA', x: 500, y: 250 },
                'A2': { n: 'Coração Verde', b: 'AMAZONIA', x: 500, y: 100 },
                'A3': { n: 'Rio Negro', b: 'AMAZONIA', x: 420, y: 150 },
                'A4': { n: 'Xingu', b: 'AMAZONIA', x: 580, y: 150 },
                'A5': { n: 'Manaus', b: 'AMAZONIA', x: 450, y: 50 },
                'A6': { n: 'Belém', b: 'AMAZONIA', x: 550, y: 50 },
                'A7': { n: 'Tapajós', b: 'AMAZONIA', x: 500, y: 180, special: 'QUIZ' },
                // Pantanal (SW)
                'P1': { n: 'Ponte Pantanal', b: 'PANTANAL', x: 380, y: 480 },
                'P2': { n: 'Rio Cuiabá', b: 'PANTANAL', x: 250, y: 550 },
                'P3': { n: 'Corumbá', b: 'PANTANAL', x: 150, y: 620 },
                'P4': { n: 'Bonito', b: 'PANTANAL', x: 250, y: 680, special: 'LUCK' },
                // Caatinga (NE)
                'K1': { n: 'Ponte Sertão', b: 'CAATINGA', x: 620, y: 320 },
                'K2': { n: 'Petrolina', b: 'CAATINGA', x: 750, y: 250 },
                'K3': { n: 'Canudos', b: 'CAATINGA', x: 880, y: 250 },
                'K4': { n: 'Sertão Bravio', b: 'CAATINGA', x: 820, y: 150, special: 'QUIZ' },
                // Cerrado (NW)
                'C1': { n: 'Ponte Planalto', b: 'CERRADO', x: 380, y: 320 },
                'C2': { n: 'Chapada', b: 'CERRADO', x: 250, y: 250 },
                'C3': { n: 'Jalapão', b: 'CERRADO', x: 120, y: 250 },
                'C4': { n: 'Brasília', b: 'CERRADO', x: 180, y: 150, special: 'LUCK' },
                'C5': { n: 'Veredas', b: 'CERRADO', x: 280, y: 180 },
                // Mata Atlântica (SE)
                'M1': { n: 'Ponte da Serra', b: 'ATLANTICA', x: 620, y: 480 },
                'M2': { n: 'Vale das Bromélias', b: 'ATLANTICA', x: 750, y: 550 },
                'M3': { n: 'Reserva', b: 'ATLANTICA', x: 880, y: 550 },
                'M4': { n: 'Bosque Sagrado', b: 'ATLANTICA', x: 820, y: 650, special: 'QUIZ' },
                'M5': { n: 'Pinhais', b: 'ATLANTICA', x: 720, y: 650 },
                'M6': { n: 'Manguezal', b: 'ATLANTICA', x: 880, y: 450 },
                // Costão Rochoso (S)
                'R1': { n: 'Ponte das Ondas', b: 'COSTAO', x: 500, y: 550 },
                'R2': { n: 'Ilhabela', b: 'COSTAO', x: 450, y: 650 },
                'R3': { n: 'Arraial', b: 'COSTAO', x: 550, y: 650 }
            },
            BRIDGES: [
                ['BASE','A1'], ['BASE','P1'], ['BASE','K1'], ['BASE','C1'], ['BASE','M1'], ['BASE','R1']
            ],
            INTERNAL_LINKS: [
                ['A1','A7'],['A7','A3'],['A7','A4'],['A3','A2'],['A4','A2'],['A2','A5'],['A2','A6'],
                ['P1','P2'],['P2','P3'],['P3','P4'],['P4','P2'],
                ['K1','K2'],['K2','K3'],['K3','K4'],['K4','K2'],
                ['C1','C2'],['C2','C3'],['C3','C4'],['C4','C5'],['C5','C2'],
                ['M1','M2'],['M2','M3'],['M3','M4'],['M4','M5'],['M5','M2'],['M3','M6'],['M6','M2'],
                ['R1','R2'],['R2','R3'],['R3','R1']
            ],
            REVERSES: [
                { n: 'Aranha Marrom', t: 'Picada! Volte 8 casas (Perca 4 tropas).', v: -4, img: './aranha marrom.certo.png' },
                { n: 'Jacaré do Pantanal', t: 'Perseguido! Volte 4 casas (Perca 2 tropas).', v: -2, img: './jacaré,.png' },
                { n: 'Ema Chasing', t: 'Fuja! Volte 9 casas (Perca 5 tropas).', v: -5, img: './ema.certo.png' },
                { n: 'Jararaca', t: 'Veneno! Volte 5 casas (Perca 3 tropas).', v: -3, img: './Jararaca.certo.png' },
                { n: 'Mico-Leão-Dourado', t: 'Ladrão! Volte 7 casas (Perca 3 tropas).', v: -3, img: './mico leão dourado.certo.png' },
                { n: 'Bicho Preguiça', t: 'Arranhão! Volte 4 casas (Perca 2 tropas).', v: -2, img: './Preguiça.certo.png' },
                { n: 'Onça Pintada', t: 'Feral! Volte 7 casas (Perca 3 tropas).', v: -3, img: './onça pintada.ceerto.png' },
                { n: 'Tamanduá Bandeira', t: 'Ataque! Volte 5 casas (Perca 2 tropas).', v: -2, img: './tamandua brandeira.certo.png' },
                { n: 'Sucuri', t: 'Abraço mortal! Volte 6 casas (Perca 3 tropas).', v: -3, img: './sucuri.certo.png' }
            ],
            QUIZ: [
                { q: 'Qual o maior felino da Amazônia?', a: ['Onça-pintada', 'Puma', 'Jaguatirica'], c: 0, img: './onça pintada.ceerto.png' },
                { q: 'Qual bioma é conhecido como "Savana Brasileira"?', a: ['Cerrado', 'Caatinga', 'Pampa'], c: 0, img: './tamandua brandeira.certo.png' },
                { q: 'Qual árvore é símbolo da Mata Atlântica?', a: ['Pau-Brasil', 'Pinho', 'Ipê'], c: 0, img: './onça pintada.ceerto.png' }
            ]
        };

        class Engine {
            constructor() {
                this.turn = 'FOREST';
                this.phase = 'RECRUIT';
                this.territories = {};
                this.troops = { FOREST: 20, INVADER: 20 };
                this.selected = null;
                this.movePts = 0;
                this.log = [];
                this.init();
            }

            init() {
                Object.entries(GAME_DATA.NODES).forEach(([id, t]) => {
                    this.territories[id] = { owner: t.startOwner || 'FOREST', count: id === 'BASE' ? 10 : 3 };
                });
                this.bind();
                this.update();
                this.addLog("Invasores detectados no Centro! Defenda os Biomas.", "system");
            }

            bind() {
                document.getElementById('next-btn').onclick = () => this.nextPhase();
                document.getElementById('m-close').onclick = () => this.hideModal();
            }

            update() {
                const isF = this.turn === 'FOREST';
                document.getElementById('turn-name').innerText = isF ? "VEZ DA FLORESTA" : "VEZ DOS INVASORES";
                document.getElementById('turn-name').style.color = isF ? "#2ecc71" : "#e74c3c";
                document.getElementById('phase-name').innerText = this.phase;
                document.getElementById('f-count').innerText = this.troops.FOREST;
                document.getElementById('i-count').innerText = this.troops.INVADER;
                document.getElementById('f-stats').classList.toggle('active', isF);
                document.getElementById('i-stats').classList.toggle('active', !isF);
                this.render();
            }

            render() {
                const links = document.getElementById('links-layer');
                const terrs = document.getElementById('terrs-layer');
                links.innerHTML = ''; terrs.innerHTML = '';

                // Draw Bridges
                GAME_DATA.BRIDGES.forEach(l => this.drawLine(l, 'bridge-line'));
                // Draw Internal
                GAME_DATA.INTERNAL_LINKS.forEach(l => this.drawLine(l, 'biome-line'));

                // Draw Nodes
                Object.entries(GAME_DATA.NODES).forEach(([id, t]) => {
                    const state = this.territories[id];
                    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                    g.setAttribute('class', `territory ${this.selected === id ? 'selected' : ''}`);
                    
                    const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    c.setAttribute('class', 'node-circle');
                    c.setAttribute('cx', t.x); c.setAttribute('cy', t.y); c.setAttribute('r', '25');
                    c.setAttribute('fill', state.owner === 'FOREST' ? '#2ecc71' : '#e74c3c');
                    c.setAttribute('stroke', GAME_DATA.BIOMES[t.b] ? GAME_DATA.BIOMES[t.b].color : '#fff');
                    c.setAttribute('stroke-width', '4');
                    g.appendChild(c);

                    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    label.setAttribute('x', t.x); label.setAttribute('y', t.y+5); label.setAttribute('text-anchor', 'middle');
                    label.setAttribute('fill', '#fff'); label.setAttribute('font-weight', '900');
                    label.textContent = state.count;
                    g.appendChild(label);

                    const name = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    name.setAttribute('x', t.x); name.setAttribute('y', t.y+40); name.setAttribute('text-anchor', 'middle');
                    name.setAttribute('fill', '#777'); name.setAttribute('font-size', '10');
                    name.textContent = t.n;
                    g.appendChild(name);

                    g.onclick = () => this.handleClick(id);
                    terrs.appendChild(g);
                });
            }

            drawLine(l, cls) {
                const t1 = GAME_DATA.NODES[l[0]]; const t2 = GAME_DATA.NODES[l[1]];
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('class', cls);
                line.setAttribute('x1', t1.x); line.setAttribute('y1', t1.y);
                line.setAttribute('x2', t2.x); line.setAttribute('y2', t2.y);
                document.getElementById('links-layer').appendChild(line);
            }

            handleClick(id) {
                const t = this.territories[id];
                const node = GAME_DATA.NODES[id];

                if (this.phase === 'RECRUIT') {
                    if (t.owner === this.turn && this.troops[this.turn] > 0) {
                        this.troops[this.turn]--; t.count++;
                        this.addLog(`Recrutou em ${node.n}`, this.turn);
                    }
                } else if (this.phase === 'MOVE') {
                    if (this.selected && this.selected !== id) {
                        if (this.territories[this.selected].owner === this.turn && t.owner === this.turn && this.isLink(this.selected, id)) {
                            this.territories[this.selected].count--; t.count++;
                        }
                        this.selected = null;
                    } else if (t.owner === this.turn) this.selected = id;
                } else if (this.phase === 'COMBAT') {
                    if (this.selected && this.selected !== id) {
                        if (t.owner !== this.turn && this.isLink(this.selected, id)) this.battle(this.selected, id);
                        this.selected = null;
                    } else if (t.owner === this.turn) this.selected = id;
                }
                this.update();
            }

            battle(aid, did) {
                const att = this.territories[aid]; const def = this.territories[did];
                if (att.count < 2) return;
                const rollA = Math.floor(Math.random()*6)+1;
                const rollD = Math.floor(Math.random()*6)+1;
                const fWin = (this.turn === 'FOREST' || def.owner === 'FOREST');
                if (fWin ? rollA >= rollD : rollA > rollD) {
                    def.count--;
                    if (def.count <= 0) {
                        def.owner = this.turn; def.count = 1; att.count--;
                        this.triggerEvent(did);
                    }
                } else att.count--;
                this.addLog(`${rollA} vs ${rollD}`, "system");
            }

            triggerEvent(id) {
                const n = GAME_DATA.NODES[id];
                if (n.special === 'QUIZ') {
                    const q = GAME_DATA.QUIZ[Math.floor(Math.random()*GAME_DATA.QUIZ.length)];
                    this.showModal("PERGUNTA DO GUARDIÃO", q.q, q);
                } else if (n.special === 'LUCK') {
                    const l = GAME_DATA.REVERSES[Math.floor(Math.random()*GAME_DATA.REVERSES.length)];
                    this.showModal("SORTE OU REVÉS", `${l.n}: ${l.t}`, { img: l.img, effect: l.v });
                }
            }

            nextPhase() {
                const phs = ['RECRUIT', 'MOVE', 'COMBAT'];
                let i = phs.indexOf(this.phase);
                if (i === 2) {
                    this.phase = 'RECRUIT';
                    this.turn = this.turn === 'FOREST' ? 'INVADER' : 'FOREST';
                    this.calcBonus();
                } else this.phase = phs[i+1];
                this.selected = null;
                this.update();
            }

            calcBonus() {
                let c = 0; Object.values(this.territories).forEach(t => { if(t.owner === this.turn) c++; });
                const b = Math.max(3, Math.floor(c/3));
                this.troops[this.turn] += b;
                this.addLog(`Turno ${this.turn}: +${b} reforços`, "system");
            }

            isLink(a, b) {
                return [...GAME_DATA.BRIDGES, ...GAME_DATA.INTERNAL_LINKS].some(l => (l[0]===a && l[1]===b) || (l[0]===b && l[1]===a));
            }

            showModal(t, b, extra) {
                document.getElementById('m-title').innerText = t;
                document.getElementById('m-body').innerHTML = b;
                const quiz = document.getElementById('m-quiz');
                quiz.classList.toggle('hidden', !extra || !extra.a);
                if (extra && extra.img) {
                    document.getElementById('m-body').innerHTML += `<br><img src="${extra.img}" onerror="this.style.display='none'">`;
                }
                if (extra && extra.a) {
                    quiz.innerHTML = '';
                    extra.a.forEach((ans, i) => {
                        const btn = document.createElement('button');
                        btn.className = 'btn btn-secondary';
                        btn.innerText = ans;
                        btn.onclick = () => {
                            if (i === extra.c) { this.troops[this.turn] += 3; this.addLog("Acertou!", "system"); }
                            this.hideModal();
                        };
                        quiz.appendChild(btn);
                    });
                }
                if (extra && extra.effect) {
                    this.troops[this.turn] = Math.max(0, this.troops[this.turn] + extra.effect);
                }
                document.getElementById('modal-overlay').classList.remove('hidden');
            }

            hideModal() {
                document.getElementById('modal-overlay').classList.add('hidden');
                this.update();
            }

            addLog(m, f) {
                this.log.unshift({ m, f });
                document.getElementById('log-entries').innerHTML = this.log.slice(0, 50).map(l => 
                    `<div class="log-entry ${l.f.toLowerCase()}">${l.m}</div>`
                ).join('');
            }
        }
        const game = new Engine();
    </script>
</body>
</html>
